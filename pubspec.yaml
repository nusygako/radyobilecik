name: radyo_app
description: Radyo 11 ve Bilecik FM canlı yayın uygulaması
publish_to: 'none'
version: 2.1.0+4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Audio
  just_audio: ^0.9.36
  audio_session: ^0.1.18

  # Firebase
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0

  # UI & Navigation
  webview_flutter: ^4.13.1
  url_launcher: ^6.3.2

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.9

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logos/bilecik_fm_logo.jpeg"
  adaptive_icon_background: "#1a1a2e"
  adaptive_icon_foreground: "assets/logos/bilecik_fm_logo.jpeg"
  min_sdk_android: 21

flutter_native_splash:
  color: "#1a1a2e"
  image: assets/logos/bilecik_fm_logo.jpeg
  android: true
  ios: true
  fullscreen: false

flutter:
  uses-material-design: true

  assets:
    - assets/logos/bilecik_fm_logo.jpeg
    - assets/logos/radyo11_logo.jpeg
